name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows
          - os: ubuntu-latest
            triplet: x64-linux
          - os: macos-latest
            triplet: x64-osx

    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      MORENO_BUILD_VERSION: 0.1.${{ github.run_number }}
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev libxext-dev libxfixes-dev libxrender-dev libxss-dev libasound2-dev libpulse-dev

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$VCPKG_ROOT/bootstrap-vcpkg.bat"
          else
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi

      - name: Configure
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_DEFAULT_TRIPLET" \
            -DMORENO_BUILD_VERSION="$MORENO_BUILD_VERSION" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moreno-text-${{ runner.os }}-${{ env.MORENO_BUILD_VERSION }}
          path: |
            bin/**
          if-no-files-found: warn
