name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows
          - os: ubuntu-latest
            triplet: x64-linux
          - os: macos-latest
            triplet: arm64-osx

    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      MORENO_BUILD_VERSION: 0.1.${{ github.run_number }}
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config \
            autoconf autoconf-archive automake libtool libltdl-dev \
            libgl1-mesa-dev libglu1-mesa-dev libegl1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev \
            libxext-dev libxfixes-dev libxrender-dev libxss-dev libxkbcommon-dev \
            libwayland-dev libibus-1.0-dev libdbus-1-dev libudev-dev \
            libasound2-dev libpulse-dev libaudio-dev libjack-jackd2-dev libsndio-dev

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install ninja autoconf autoconf-archive automake libtool

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$VCPKG_ROOT/bootstrap-vcpkg.bat"
          else
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="$env:VCPKG_DEFAULT_TRIPLET" `
            -DMORENO_BUILD_VERSION="$env:MORENO_BUILD_VERSION"

      - name: Configure Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_DEFAULT_TRIPLET" \
            -DMORENO_BUILD_VERSION="$MORENO_BUILD_VERSION" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Windows
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Build Unix
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Test Windows
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Test Unix
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Package artifact
        shell: bash
        run: |
          cmake -E make_directory dist
          cmake -E tar cf "dist/moreno-text-${RUNNER_OS}-${MORENO_BUILD_VERSION}.zip" --format=zip bin

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moreno-text-${{ runner.os }}-${{ env.MORENO_BUILD_VERSION }}
          path: |
            dist/*.zip
          if-no-files-found: warn

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    env:
      MORENO_BUILD_VERSION: 0.1.${{ github.run_number }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.MORENO_BUILD_VERSION }}
          name: Moreno Text v${{ env.MORENO_BUILD_VERSION }}
          prerelease: true
          generate_release_notes: true
          files: release-assets/*.zip
